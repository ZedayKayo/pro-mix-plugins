<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ProMix Plugins — Professional audio plugins for music producers and engineers. EQs, compressors, reverbs, synthesizers, and mastering tools up to 70% off retail. Pay with crypto." />
  <meta name="keywords" content="audio plugins, VST, music production, DAW, mixing, mastering, crypto payments, Bitcoin, Ethereum, FabFilter, iZotope, Waves" />
  <meta name="author" content="ProMix Plugins" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>ProMix Plugins — Professional Audio Tools for Music Production</title>

  <!-- Open Graph -->
  <meta property="og:title" content="ProMix Plugins — Professional Audio Tools for Music Production" />
  <meta property="og:description" content="Access 80+ professional audio plugins — EQs, compressors, reverbs, synthesizers — at up to 70% off retail. Pay with crypto. Download instantly." />
  <meta property="og:image" content="/images/og-default.jpg" />
  <meta property="og:url" content="https://promixplugins.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ProMix Plugins" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ProMix Plugins — Professional Audio Tools for Music Production" />
  <meta name="twitter:description" content="Access 80+ professional audio plugins at up to 70% off retail. Pay with crypto. Download instantly." />
  <meta name="twitter:image" content="/images/og-default.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="/images/icon.png" />
</head>
<body>
  <div id="app">
    <!-- Premium Loading Screen -->
    <div style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
      overflow: hidden;
    ">
      <!-- Background Glow Orbs -->
      <div style="
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
        top: 20%;
        left: 20%;
        pointer-events: none;
      "></div>
      <div style="
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(255, 107, 43, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
        bottom: 10%;
        right: 15%;
        pointer-events: none;
      "></div>

      <!-- Content Container -->
      <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        position: relative;
        z-index: 10;
      ">
        <!-- Logo -->
        <div style="
          margin-bottom: 2rem;
          font-size: 2.2rem;
          font-weight: 700;
          letter-spacing: -0.5px;
          color: #ffffff;
        ">
          Pro<span style="color: #00ff88;">Mix</span>
        </div>

        <!-- Spinner -->
        <div style="
          width: 48px;
          height: 48px;
          border: 3px solid rgba(255, 255, 255, 0.03);
          border-top: 3px solid #00ff88;
          border-right: 3px solid #00ff88;
          border-radius: 50%;
          animation: promix-spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        "></div>

        <p style="
          margin-top: 1.5rem;
          font-size: 0.95rem;
          color: #94a3b8;
          letter-spacing: 0.5px;
          animation: promix-pulse 1.8s ease-in-out infinite;
        ">Initializing Studio...</p>
      </div>

      <style>
        @keyframes promix-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes promix-pulse {
          0%, 100% { opacity: 0.6; }
          50% { opacity: 1; }
        }
      </style>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
